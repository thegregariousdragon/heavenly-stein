name: Markdown checks

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/markdown-checks.yml"
      - ".markdownlint.json"
      - ".lychee.toml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/workflows/markdown-checks.yml"
      - ".markdownlint.json"
      - ".lychee.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  required-files:
    name: Required files
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify source-of-truth files
        shell: bash
        run: |
          set -euo pipefail
          required_files=(
            "README.md"
            "CANON_INDEX.md"
            "MANIFEST.md"
            "ACCESSIBILITY.md"
            "quick-reference/QUICK_START.md"
            "quick-reference/CANON_LOCKS.md"
            "quick-reference/RECENT_CHANGES.md"
            "ai-workflows/README.md"
            "ai-workflows/CONTEXT_PACKS.md"
            "ai-workflows/DRAFT_SCENE.md"
            "ai-workflows/CONTINUITY_AUDIT.md"
            "ai-workflows/BRANCHING_MODEL.md"
            "ai-workflows/CANON_PROMOTION.md"
            "ai-workflows/VALIDATION.md"
          )

          missing=0
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required file: $file"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run markdownlint with explicit config
        shell: bash
        run: |
          set -euo pipefail
          npx --yes markdownlint-cli@0.45.0 --config .markdownlint.json "**/*.md"

  link-check:
    name: Link check informational
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Markdown links without blocking
        uses: lycheeverse/lychee-action@v2
        continue-on-error: true
        with:
          args: --config .lychee.toml "**/*.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summarize informational link check
        shell: bash
        run: |
          echo "Link checking is informational during baseline stabilization."
